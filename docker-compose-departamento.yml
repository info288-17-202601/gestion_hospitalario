services:

  inventory_service:
    image: inventory_service
    build: ./Departamento/Inventory_Service
    container_name: inventory_service
    ports:
      - "7010:7010"
    environment:
      - TZ=America/Santiago
    env_file:
      - ./Departamento/Inventory_Service/.env
    restart: unless-stopped
    networks:
      - hospital_network

  reporting_service:
    image: reporting_service
    build: ./Departamento/Reporting_service
    container_name: reporting_service
    ports:
      - "7030:7030"
    environment:
      - TZ=America/Santiago
    env_file:
      - ./Departamento/Reporting_service/.env
    restart: unless-stopped
    networks:
      - hospital_network

networks:
  hospital_network:
    driver: bridge
